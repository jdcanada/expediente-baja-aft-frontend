<h2 mat-dialog-title>
  {{ isEdit ? 'Editar Área' : 'Nueva Área' }}
</h2>

<form [formGroup]="form" (ngSubmit)="guardar()" autocomplete="off">
  <mat-dialog-content>
    <div class="form-group-fields">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Código área</mat-label>
        <input matInput formControlName="codigo_area" maxlength="50">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombre del área</mat-label>
        <input matInput formControlName="nombre_area" required maxlength="100">
        <mat-error *ngIf="form.get('nombre_area')?.hasError('required')">
          El nombre es obligatorio
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Estructura</mat-label>
        <mat-select formControlName="estructura_id" required>
          <mat-option *ngFor="let estructura of estructuras" [value]="estructura.idestructura">
            {{ estructura.nombre_estructura }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="form.get('estructura_id')?.hasError('required')">
          La estructura es obligatoria
        </mat-error>
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading">
      <mat-icon>check</mat-icon> Guardar
    </button>
    <button mat-button type="button" (click)="cancelar()">
      <mat-icon>close</mat-icon> Cancelar
    </button>
  </mat-dialog-actions>
</form>
